- name: Pre-Migration Checks
  hosts: migrator
  connection: local
  gather_facts: true

  vars:
    collection_modules_subpath: "ansible_collections/os_migrate/vmware_migration_kit/plugins/modules"

  tasks:
    - name: Check installed collection paths
      ansible.builtin.stat:
        path: "{{ item ~ '/' ~ collection_modules_subpath }}"
      loop: "{{ lookup('config', 'COLLECTIONS_PATHS') }}"
      register: collection_paths
      no_log: true

    - name: Set installed collection modules path
      ansible.builtin.set_fact:
        modules_root: >-
          {{ (collection_paths.results
              | selectattr('stat.isdir', 'defined')
              | selectattr('stat.isdir')
              | map(attribute='item')
              | first) ~ '/' ~ collection_modules_subpath }}

    - name: Fail if installed collection was not found in the execution environment
      ansible.builtin.fail:
        msg: >-
          ERROR: Collection os_migrate.vmware_migration_kit was not found in configured COLLECTIONS_PATHS:
          {{ lookup('config', 'COLLECTIONS_PATHS') | join(', ') }}
      when: collection_paths.results | selectattr('stat.isdir', 'defined') | selectattr('stat.isdir') | list | length == 0

    - name: List all Go module directories
      ansible.builtin.find:
        paths: "{{ modules_root }}"
        file_type: directory
        recurse: false
      register: src_contents
      no_log: true

    - name: Extract Go module names
      ansible.builtin.set_fact:
        go_modules: "{{ src_contents.files | map(attribute='path') | map('basename') | list }}"

    - name: Verify compiled Go binaries exist
      ansible.builtin.stat:
        path: "{{ modules_root }}/{{ item }}"
      register: binary_status
      loop: "{{ go_modules }}"

    - name: Fail if any compiled Go binary is missing
      ansible.builtin.fail:
        msg: "ERROR: Missing compiled Go binaries: {{ missing_modules | join(', ') }}. Please compile them."
      vars:
        missing_modules: >-
          {{ binary_status.results
             | selectattr('stat.exists', 'equalto', false)
             | map(attribute='item')
             | list }}
      when: missing_modules | length > 0
